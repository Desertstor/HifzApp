name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Unzip project
      run: unzip HifzApp.zip -d extracted

    - name: Find gradlew
      run: find extracted -name "gradlew" -type f

    - name: Find structure
      run: ls -la extracted/

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Remove font references
      run: |
        find extracted -name "themes.xml" -exec grep -l "font/amiri" {} \; | xargs -I{} sed -i '/font\/amiri/d' {}
        find extracted -name "activity_recitation.xml" -exec sed -i '/font\/amiri/d' {} \;

    - name: Grant gradlew permission
      run: find extracted -name "gradlew" -exec chmod +x {} \;

    - name: Build Debug APK
      run: |
        GRADLEW=$(find extracted -name "gradlew" | head -1)
        PROJ_DIR=$(dirname $GRADLEW)
        cd $PROJ_DIR && ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: HifzApp-debug
        path: "**/app-debug.apk"
        retention-days: 7

name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Unzip project
      run: unzip HifzApp.zip -d .

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Fix font in themes
      run: python3 -c "
import re
with open('HifzApp/app/src/main/res/values/themes.xml') as f: c=f.read()
c=re.sub(r'.*@font/amiri.*\n','',c)
with open('HifzApp/app/src/main/res/values/themes.xml','w') as f: f.write(c)
"

    - name: Fix font in layout
      run: python3 -c "
with open('HifzApp/app/src/main/res/layout/activity_recitation.xml') as f: c=f.read()
c=c.replace('android:fontFamily=\"@font/amiri\"','')
with open('HifzApp/app/src/main/res/layout/activity_recitation.xml','w') as f: f.write(c)
"

    - name: Grant gradlew permission
      run: chmod +x HifzApp/gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon
      working-directory: HifzApp

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: HifzApp-debug
        path: HifzApp/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

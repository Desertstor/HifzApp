name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Unzip project
      run: unzip HifzApp.zip -d .

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Remove font references
      working-directory: HifzApp/app/src/main/res
      run: |
        grep -v "font/amiri" values/themes.xml > values/themes_new.xml
        mv values/themes_new.xml values/themes.xml
        grep -v "font/amiri" layout/activity_recitation.xml > layout/recitation_new.xml
        mv layout/recitation_new.xml layout/activity_recitation.xml

    - name: Grant gradlew permission
      run: chmod +x HifzApp/gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon
      working-directory: HifzApp

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: HifzApp-debug
        path: HifzApp/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
